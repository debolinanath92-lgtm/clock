<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Clock</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
        }

        .clock-wrapper {
            position: relative;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        /* Glowing ring */
        .clock-ring {
            position: absolute;
            inset: 0;
            border-radius: 2rem;
            border: 1.5px solid rgba(99, 179, 237, 0.25);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 40px rgba(99, 179, 237, 0.08),
                inset 0 0 40px rgba(99, 179, 237, 0.04);
        }

        .clock-inner {
            position: relative;
            z-index: 1;
        }

        /* Live badge */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(72, 199, 142, 0.12);
            border: 1px solid rgba(72, 199, 142, 0.3);
            color: #48c78e;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 999px;
            margin-bottom: 1.8rem;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #48c78e;
            animation: pulse 1.2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(72, 199, 142, 0.5);
            }

            50% {
                opacity: 0.6;
                box-shadow: 0 0 0 5px rgba(72, 199, 142, 0);
            }
        }

        /* Time display */
        .clock-display {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 14vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 0.06em;
            line-height: 1;
            background: linear-gradient(180deg, #e0f0ff 0%, #7ec8f4 60%, #4a9fd4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
            text-shadow: none;
            filter: drop-shadow(0 0 18px rgba(99, 179, 237, 0.4));
        }

        /* Colon blink */
        .colon {
            animation: blink 1s step-start infinite;
            display: inline-block;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        /* AM/PM */
        .ampm {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-weight: 700;
            color: rgba(99, 179, 237, 0.6);
            letter-spacing: 0.12em;
            margin-left: 6px;
            vertical-align: super;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, rgba(99, 179, 237, 0.4), transparent);
            margin: 1.2rem auto;
        }

        /* Date section */
        .clock-day {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .clock-date {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.85rem, 3vw, 1.05rem);
            color: rgba(148, 163, 184, 0.85);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Segment labels */
        .time-labels {
            display: flex;
            justify-content: center;
            gap: clamp(1.6rem, 8vw, 4.2rem);
            margin-top: 0.6rem;
            margin-bottom: 0;
        }

        .time-labels span {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            color: rgba(99, 179, 237, 0.45);
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="clock-wrapper">
        <div class="clock-ring"></div>
        <div class="clock-inner">

            <div class="live-badge">
                <span class="dot"></span> Live
            </div>

            <div class="clock-display">
                <span id="watch-h">00</span><span class="colon">:</span><span id="watch-m">00</span><span
                    class="colon">:</span><span id="watch-s">00</span><span class="ampm" id="watch-ampm">AM</span>
            </div>

            <div class="time-labels">
                <span>Hour</span>
                <span>Min</span>
                <span>Sec</span>
            </div>

            <div class="divider"></div>

            <div class="clock-day" id="clock-day">Wednesday</div>
            <div class="clock-date" id="clock-date">08 April 2026</div>

        </div>
    </div>

    <script src="d_clock.js"></script>

    <script>
        (function () {
            function pad(n) { return String(n).padStart(2, '0'); }

            const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

            function tick() {
                const now = new Date();
                let h = now.getHours();
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;

                document.getElementById('watch-h').textContent = pad(h);
                document.getElementById('watch-m').textContent = pad(now.getMinutes());
                document.getElementById('watch-s').textContent = pad(now.getSeconds());
                document.getElementById('watch-ampm').textContent = ampm;
                document.getElementById('clock-day').textContent = DAYS[now.getDay()];
                document.getElementById('clock-date').textContent =
                    pad(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
            }
            tick();
            setInterval(tick, 1000);
        })();
        </script>
